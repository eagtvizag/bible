<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian Book Room | PM Palem, Visakhapatnam</title>
    
    <!-- Google Fonts for Elegant Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS Variables for Color Theme */
        :root {
            --primary-color: #1a365d; /* Deep Blue */
            --secondary-color: #d69e2e; /* Gold */
            --text-color: #333333;
            --bg-light: #f7fafc;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            line-height: 1.6;
            background-color: var(--bg-light);
        }

        h1, h2, h3, .logo {
            font-family: 'Playfair Display', serif;
        }

        /* --- Navigation Bar --- */
        header {
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .logo {
            font-size: 24px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            color: var(--secondary-color);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 500;
            font-size: 16px;
            position: relative;
            transition: var(--transition);
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background: var(--secondary-color);
            bottom: -5px;
            left: 0;
            transition: var(--transition);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        nav ul li a:hover {
            color: var(--secondary-color);
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--primary-color);
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(26, 54, 93, 0.8), rgba(26, 54, 93, 0.8)), url('https://images.unsplash.com/photo-1507692049790-de58290a4334?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
            color: var(--secondary-color);
            animation: fadeInDown 1s ease;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
            max-width: 800px;
            animation: fadeInUp 1s ease;
        }

        .btn {
            padding: 12px 30px;
            background-color: var(--secondary-color);
            color: var(--white);
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            transition: var(--transition);
            border: 2px solid var(--secondary-color);
            animation: fadeInUp 1.5s ease;
        }

        .btn:hover {
            background-color: transparent;
            color: var(--secondary-color);
        }

        /* --- Sections Common --- */
        section {
            padding: 80px 10%;
        }

        .section-title {
            text-align: center;
            font-size: 36px;
            color: var(--primary-color);
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::after {
            content: '';
            width: 80px;
            height: 3px;
            background: var(--secondary-color);
            display: block;
            margin: 10px auto 0;
        }

        /* --- About Section --- */
        .about-content {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .about-text {
            flex: 1;
        }

        .about-text p {
            margin-bottom: 15px;
            font-size: 17px;
            text-align: justify;
        }

        .about-image {
            flex: 1;
        }

        .about-image img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* --- Products Section --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: var(--transition);
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 3px solid var(--secondary-color);
        }

        .product-info {
            padding: 25px 20px;
        }

        .product-info h3 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 22px;
        }

        .product-info p {
            font-size: 14px;
            color: #666;
        }

        /* --- Contact Section & Form CSS --- */
        .contact-container {
            display: flex;
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .contact-info, .contact-form {
            flex: 1;
            padding: 50px;
        }

        .contact-info {
            background: var(--primary-color);
            color: var(--white);
        }

        .contact-info h3 {
            font-size: 28px;
            margin-bottom: 20px;
            color: var(--secondary-color);
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
            gap: 15px;
        }

        .info-item i {
            font-size: 24px;
            color: var(--secondary-color);
            margin-top: 5px;
        }

        /* WhatsApp Form Styles */
        .contact-form {
            background: #ffffff;
        }
        
        .contact-form h3 {
            font-size: 28px;
            color: #1a365d;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-form p.sub-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #d69e2e;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(214, 158, 46, 0.2);
        }

        .whatsapp-btn {
            background: linear-gradient(to right, #25D366, #128C7E);
            color: #ffffff;
            border: none;
            padding: 16px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
